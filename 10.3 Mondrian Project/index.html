<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mondrian Project</title>
  <style>
    body{
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container{
      display: grid;
      grid-template-columns: 320px 1fr 1fr 50px;
      grid-template-rows: 414px 1fr 1fr 20px;
      grid-area: 9px;
      background-color: black;
      gap: 9px;
      width: 748px;
      height: 748px;
      
      
  
    }
    .red{
      background-color:#E72F24;   
    }

    .white{
      background-color: #F0F1EC;
    }
    .first{
      grid-column: span 3;
    }
    .second{
      grid-row: span 2;
    }

    .third{
      grid-row: span 2;
      grid-column: span 2;
    }
    .blue{
      background-color: #004592;
      height: 130px;
    }
    .forth{
      grid-row: span 2;
    }
    .yellow{
      background-color: #F9D01E;
    }

  

    /* 
    Write your CSS here 
    Gap Colour: #000
    White: #F0F1EC
    Red: #E72F24
    Black: #232629
    Blue: #004592
    Yellow: #F9D01E

    For dimensions, see dimensions.png image.
    HINT: Remember you can't change the properties of grid lines.
    But grid lines are transparent!
    */
  </style>
</head>

<body>
  <div class="container">
  <div class="red"></div>
  <div class="white first"></div>
  <div class="white second"></div>
  <div class="white third"></div>
  <div class="blue"></div>
  <div class="white forth"></div>
  <div class="white fifth"></div>
  <div class="yellow"></div>
  <div class="black"></div>

</div>
  <!-- Write your HTML here -->
</body>

</html>
